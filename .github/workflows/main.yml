on:
  push:
    branches:
      - master
name: 🚀 Deploy website on push
jobs:
  web-deploy:
    name: 🎉 Deploy to FTP
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.new_ftp_server }}
        username: ${{ secrets.new_ftp_username }}
        password: ${{ secrets.new_ftp_password }}
        server-dir: ${{ secrets.new_ftp_userdir }}
        exclude: |
          **/.git*
          **/.git*/**
          **/Classes/KKDConfig.php
          **/docs/**
