on:
  push:
    branches:
      - master
name: 🚀 Deploy website on push
jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ftp.koningskerkdeventer.nl
        username: koning1q
        password: ${{ secrets.ftp_password }}
        server-dir: /public_html/intranet/
        exclude: |
          **/.git*
          **/.git*/**
          **/Classes/KKDConfig.php
          **/docs/**
  
  web-deploy_new:
    name: 🎉 Deploy ZXCS
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: web0171.zxcs.nl
        username: u224095p489749
        password: ${{ secrets.new_ftp_password }}
        server-dir: /home/u224095p489749/domains/koningskerkdeventer.nl/public_html/intranet/
        exclude: |
          **/.git*
          **/.git*/**
          **/Classes/KKDConfig.php
          **/docs/**
